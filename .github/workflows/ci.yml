name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test tooling
        run: npm ci

      - name: Lua behavior tests
        run: npm test

      - name: Luacheck
        uses: nebularg/actions-luacheck@v1
        with:
          files: Constants.lua Snapshot.lua UI.lua ExportTab.lua GearTab.lua OptionsTab.lua Core.lua
          config: .luacheckrc
