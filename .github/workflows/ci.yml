name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Luacheck
        uses: nebularg/actions-luacheck@v1
        with:
          files: Constants.lua Snapshot.lua UI.lua ExportTab.lua GearTab.lua OptionsTab.lua Core.lua
          config: .luacheckrc
